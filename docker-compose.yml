version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: neet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neet_ai
    ports:
      - "5432:5432"
    volumes:
      - neet_ai_pgdata:/var/lib/postgresql/data

volumes:
  neet_ai_pgdata:
